name=LionArray
version=1.0.1
author=leva <leva.the.lion@gmail.com>
maintainer=leva <leva.the.lion@gmail.com>
sentence=Lean dynamic Array, Queue and Stack for embedded C++.
paragraph=Minimal, allocation-frugal Array<T>/Queue<T>/Stack<T> for microcontrollers. Designed for trivially-copyable element types (primitives, PODs, raw pointers) — enforced at compile time. Non-copyable, header-only, no dependencies. Note: pointer elements are stored non-owning (the container never deletes pointees), and the non-const operator[] grows the array on out-of-range write by design.
category=Data Storage
url=https://github.com/blah188/LionArray
architectures=*
